name: Probe IP · Mercadona (temporal)

on:
  push:
    branches: [feat/preus-mercadona-verdures]
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sondeig des de la IP del runner
        run: python tools/probe_ip.py
